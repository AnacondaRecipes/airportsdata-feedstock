{% set name = "airportsdata" %}
{% set version = "20250909" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/airportsdata-{{ version }}.tar.gz
  sha256: f39974fe1101817ced4ccf7c6ed336408469e5e778395d0a3e7a5112ec298f90

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python
    - setuptools
    - pip
    - wheel
  run:
    - python

test:
  imports:
    - airportsdata
  commands:
    - pip check
  requires:
    - python
    - pip

about:
  home: https://github.com/mborsetti/airportsdata
  summary: Extensive database of location and timezone data for nearly every airport and landing strip in the world.
  description: |
    Extensive database of location and timezone data for nearly every operational airport and 
    landing strip in the world, with 28,270 entries.

  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/mborsetti/airportsdata
  doc_url: https://github.com/mborsetti/airportsdata

extra:
  recipe-maintainers:
    - ianaobi
  recipe-maintainers:
    - maresb
